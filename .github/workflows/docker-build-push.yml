name: Build and Push Multi-Platform Docker Image

on:
  push:
    branches:
      - main
      - dev
  workflow_dispatch:
    inputs:
      tag:
        description: 'Docker tag (e.g. manual or v1.0.0)'
        required: true
        default: 'manual'
      include_latest:
        description: 'Also tag as latest'
        required: false
        default: false
        type: boolean

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '22.x'

      - name: Install dependencies
        run: npm install

      - name: Run tests
        run: npm test

      - name: Init DB (smoke check)
        run: npm run init-db

  build:
    runs-on: ubuntu-latest
    needs: test

    steps:
      - name: Checkout the repository
        uses: actions/checkout@v6

      - name: Docker Setup QEMU
        uses: docker/setup-qemu-action@v3.2.0

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3.6.1

      - name: Log in to Docker Hub
        run: echo "${{ secrets.DOCKERHUB_TOKEN }}" | docker login -u "${{ secrets.DOCKERHUB_USERNAME }}" --password-stdin

      - name: Determine Docker tags
        id: docker_tags
        run: |
          SHORT_SHA="${GITHUB_SHA::7}"
          IMAGE="${{ secrets.DOCKERHUB_USERNAME }}/birdcam"

          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            TAG="${{ github.event.inputs.tag }}"
            if [ "${{ github.event.inputs.include_latest }}" = "true" ]; then
              echo "tags=${IMAGE}:latest,${IMAGE}:${TAG},${IMAGE}:${TAG}-${SHORT_SHA}" >> $GITHUB_OUTPUT
            else
              echo "tags=${IMAGE}:${TAG},${IMAGE}:${TAG}-${SHORT_SHA}" >> $GITHUB_OUTPUT
            fi
          elif [ "${{ github.ref_name }}" = "dev" ]; then
            echo "tags=${IMAGE}:dev,${IMAGE}:dev-${SHORT_SHA}" >> $GITHUB_OUTPUT
          else
            # Push to main
            echo "tags=${IMAGE}:latest,${IMAGE}:main,${IMAGE}:main-${SHORT_SHA}" >> $GITHUB_OUTPUT
          fi

      - name: Build and push multi-platform Docker image
        uses: docker/build-push-action@v6.7.0
        with:
          context: .
          file: ./Dockerfile
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.docker_tags.outputs.tags }}
          build-args: GIT_COMMIT=${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
