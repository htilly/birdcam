services:
  birdcam:
    build: .
    ports:
      - "3000:3000"
    environment:
      - PORT=3000
      # Optional: create first admin on first run
      # - ADMIN_USER=admin
      # - ADMIN_PASSWORD=changeme
      # SESSION_SECRET is auto-generated and persisted in the DB.
      # Only set this if you need a specific value or share sessions across instances.
      # - SESSION_SECRET=your-secret-here
    volumes:
      - birdcam-data:/app/data
    restart: unless-stopped

volumes:
  birdcam-data:
