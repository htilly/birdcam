# bird_tv app — viewer + admin + chat
# Nginx runs in its own container and proxies to the bird_tv app.
# Backend: bird_tv container. Nginx must be on the same Docker network (e.g., bird_cam_default)
# so that "birdcam" resolves to the correct container. Service name from compose is "birdcam".
#
# Example: connect your nginx container to the network:
#   docker network connect bird_cam_default <your-nginx-container>
# or run both in the same compose with a shared network.
#
# Cloudflare proxy (orange cloud):
#   - set_real_ip_from: trust Cloudflare's IP ranges, log real client IPs
#   - real_ip_header: extract real client IP from CF-Connecting-IP header
#   - proxy_buffering off on /hls: prevent nginx from buffering live HLS segments

upstream bird_tv_backend {
    # Replace with your actual backend IP/hostname and port
    server 192.168.1.100:3000;
}

# Cloudflare IPv4 ranges — updated list at https://www.cloudflare.com/ips-v4/
set_real_ip_from 173.245.48.0/20;
set_real_ip_from 103.21.244.0/22;
set_real_ip_from 103.22.200.0/22;
set_real_ip_from 103.31.4.0/22;
set_real_ip_from 141.101.64.0/18;
set_real_ip_from 108.162.192.0/18;
set_real_ip_from 190.93.240.0/20;
set_real_ip_from 188.114.96.0/20;
set_real_ip_from 197.234.240.0/22;
set_real_ip_from 198.41.128.0/17;
set_real_ip_from 162.158.0.0/15;
set_real_ip_from 104.16.0.0/13;
set_real_ip_from 104.24.0.0/14;
set_real_ip_from 172.64.0.0/13;
set_real_ip_from 131.0.72.0/22;
# Cloudflare IPv6 ranges
set_real_ip_from 2400:cb00::/32;
set_real_ip_from 2606:4700::/32;
set_real_ip_from 2803:f800::/32;
set_real_ip_from 2405:b500::/32;
set_real_ip_from 2405:8100::/32;
set_real_ip_from 2a06:98c0::/29;
set_real_ip_from 2c0f:f248::/32;

real_ip_header CF-Connecting-IP;

server {
    listen 443 ssl;
    listen [::]:443 ssl;

    server_name your.domain.com;

    include /config/nginx/ssl.conf;  # Replace with your SSL config path

    client_max_body_size 0;

    # HLS live-streaming — buffering disabled for minimal latency
    location /hls {
        proxy_pass http://bird_tv_backend;
        proxy_http_version 1.1;
        proxy_buffering off;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # WebSocket for chat (must be before the general location)
    location /ws {
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "Upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_pass http://bird_tv_backend;
    }

    # Everything else -> bird_tv app (/, /admin, /api, static)
    location / {
        proxy_pass http://bird_tv_backend;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host $host;
    }
}
