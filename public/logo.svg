<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 120" fill="none">
  <!-- Sky background circle -->
  <circle cx="60" cy="60" r="58" fill="#7dd3fc" stroke="#bae6fd" stroke-width="2"/>

  <!-- Branch -->
  <rect x="18" y="82" width="84" height="10" rx="5" fill="#a16207"/>
  <rect x="30" y="78" width="8" height="14" rx="3" fill="#854d0e"/>
  <rect x="82" y="76" width="8" height="16" rx="3" fill="#854d0e"/>

  <!-- Bird body -->
  <ellipse cx="60" cy="62" rx="22" ry="18" fill="#4ade80"/>
  <!-- Bird head -->
  <circle cx="60" cy="42" r="14" fill="#4ade80"/>

  <!-- Wing -->
  <ellipse cx="44" cy="65" rx="10" ry="6" fill="#22c55e" transform="rotate(-20 44 65)"/>

  <!-- Belly highlight -->
  <ellipse cx="62" cy="67" rx="11" ry="9" fill="#bbf7d0"/>

  <!-- Eye white -->
  <circle cx="64" cy="40" r="5" fill="white"/>
  <!-- Eye pupil -->
  <circle cx="65" cy="40" r="3" fill="#1c1917"/>
  <!-- Eye shine -->
  <circle cx="66" cy="39" r="1" fill="white"/>

  <!-- Beak -->
  <path d="M72 44 L80 46 L72 49 Z" fill="#a16207"/>

  <!-- Camera body on bird's chest -->
  <rect x="50" y="60" width="20" height="15" rx="3" fill="#1c1917"/>
  <!-- Camera lens -->
  <circle cx="60" cy="67" r="5" fill="#374151"/>
  <circle cx="60" cy="67" r="3.5" fill="#7dd3fc"/>
  <circle cx="60" cy="67" r="2" fill="#1c1917"/>
  <circle cx="59" cy="66" r="0.7" fill="white"/>
  <!-- Camera flash/viewfinder bump -->
  <rect x="55" y="57" width="7" height="4" rx="1.5" fill="#374151"/>
  <!-- Record dot -->
  <circle cx="66" cy="62" r="1.5" fill="#f87171"/>

  <!-- Tail feathers -->
  <path d="M48 76 Q38 90 32 95 Q42 88 50 82" fill="#22c55e"/>
  <path d="M60 78 Q56 94 54 100 Q60 90 62 82" fill="#16a34a"/>

  <!-- Little feet on branch -->
  <line x1="55" y1="80" x2="52" y2="86" stroke="#a16207" stroke-width="2" stroke-linecap="round"/>
  <line x1="52" y1="86" x2="48" y2="87" stroke="#a16207" stroke-width="2" stroke-linecap="round"/>
  <line x1="52" y1="86" x2="50" y2="89" stroke="#a16207" stroke-width="2" stroke-linecap="round"/>
  <line x1="52" y1="86" x2="54" y2="89" stroke="#a16207" stroke-width="2" stroke-linecap="round"/>

  <line x1="65" y1="80" x2="68" y2="86" stroke="#a16207" stroke-width="2" stroke-linecap="round"/>
  <line x1="68" y1="86" x2="72" y2="87" stroke="#a16207" stroke-width="2" stroke-linecap="round"/>
  <line x1="68" y1="86" x2="70" y2="89" stroke="#a16207" stroke-width="2" stroke-linecap="round"/>
  <line x1="68" y1="86" x2="66" y2="89" stroke="#a16207" stroke-width="2" stroke-linecap="round"/>
</svg>
