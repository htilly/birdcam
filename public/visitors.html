<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Visitors – Birdcam Live</title>
  <link rel="icon" type="image/png" href="favicon.png">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@400;600&family=Nunito:wght@400;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
  <style>
    /* Visitors page specific styles */
    .visitors-main {
      padding: 2rem 1.5rem;
      max-width: 1000px;
      margin: 0 auto;
    }
    .visitors-header {
      margin-bottom: 2rem;
      text-align: center;
    }
    .visitors-header h1 {
      font-family: 'Fredoka', sans-serif;
      font-size: 2.5rem;
      font-weight: 600;
      color: var(--text);
      margin: 0 0 0.5rem 0;
    }
    .visitors-desc {
      font-size: 1.1rem;
      color: var(--text-muted);
      margin: 0;
    }
    .visitor-stats-cards {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
      gap: 1.5rem;
      margin-bottom: 3rem;
    }
    .visitor-card {
      background: var(--bg-elevated);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 1.5rem;
      text-align: center;
    }
    .visitor-card-value {
      display: block;
      font-family: 'Fredoka', sans-serif;
      font-size: 2.5rem;
      font-weight: 600;
      color: var(--accent);
      margin-bottom: 0.5rem;
    }
    .visitor-card-label {
      display: block;
      font-size: 0.95rem;
      color: var(--text-muted);
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }
    .visitor-chart-wrap {
      background: var(--bg-elevated);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 2rem;
    }
    .visitor-chart-wrap h2 {
      font-family: 'Fredoka', sans-serif;
      font-size: 1.5rem;
      font-weight: 600;
      color: var(--text);
      margin: 0 0 1.5rem 0;
    }
    @media (max-width: 600px) {
      .visitors-main {
        padding: 1.5rem 1rem;
      }
      .visitors-header h1 {
        font-size: 2rem;
      }
      .visitor-stats-cards {
        grid-template-columns: 1fr;
        gap: 1rem;
      }
      .visitor-chart-wrap {
        padding: 1.25rem;
      }
    }
  </style>
</head>
<body>
  <div class="app">
    <header class="header">
      <a href="/" class="logo" style="text-decoration: none; color: inherit;">
        <img src="logo.png" alt="Birdcam Live" class="logo-img">
        Birdcam Live
      </a>
      <span class="live-pill">Live</span>
      <div class="admin-link-wrap">
        <a href="/admin" class="admin-link">Admin</a>
        <span class="build-number" id="build-number"></span>
      </div>
    </header>

    <main class="visitors-main">
      <div class="visitors-header">
        <img src="stats.png" alt="" style="width: 120px; height: auto; display: block; margin: 0 auto 1rem;">
        <h1>Visitor History</h1>
        <p class="visitors-desc">Unique visitors to the live stream page (cookie-based)</p>
      </div>

      <div class="visitor-stats-cards">
        <div class="visitor-card">
          <span class="visitor-card-value" id="stat-today">—</span>
          <span class="visitor-card-label">Unique today</span>
        </div>
        <div class="visitor-card">
          <span class="visitor-card-value" id="stat-week">—</span>
          <span class="visitor-card-label">Last 7 days</span>
        </div>
        <div class="visitor-card">
          <span class="visitor-card-value" id="stat-month">—</span>
          <span class="visitor-card-label">Last 30 days</span>
        </div>
      </div>

      <div class="visitor-chart-wrap">
        <h2>Unique visitors per day (last 30 days)</h2>
        <canvas id="visitor-chart" width="800" height="280" role="img" aria-label="Line chart of unique visitors per day"></canvas>
      </div>
    </main>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.6/dist/chart.umd.min.js"></script>
  <script>
(function() {
  function fmt(n) {
    return n >= 1000000 ? (n/1e6).toFixed(1) + 'M' : n >= 1000 ? (n/1000).toFixed(1) + 'k' : String(n);
  }

  function load() {
    fetch('/api/visitor-stats')
      .then(function(r) { return r.json(); })
      .then(function(data) {
        document.getElementById('stat-today').textContent = fmt(data.uniqueToday);
        document.getElementById('stat-week').textContent = fmt(data.uniqueWeek);
        document.getElementById('stat-month').textContent = fmt(data.uniqueMonth);

        var daily = data.daily || [];
        var last30 = [];
        var d = new Date();
        for (var i = 29; i >= 0; i--) {
          var day = new Date(d);
          day.setDate(day.getDate() - i);
          var dateStr = day.toISOString().slice(0, 10);
          var row = daily.find(function(r) { return r.date === dateStr; });
          last30.push({ date: dateStr, count: row ? row.count : 0 });
        }

        var labels = last30.map(function(r) {
          var d = new Date(r.date + 'T12:00:00');
          return d.toLocaleDateString(undefined, { month: 'short', day: 'numeric' });
        });
        var counts = last30.map(function(r) { return r.count; });

        var ctx = document.getElementById('visitor-chart').getContext('2d');
        if (window.visitorChart) window.visitorChart.destroy();
        window.visitorChart = new Chart(ctx, {
          type: 'line',
          data: {
            labels: labels,
            datasets: [{
              label: 'Unique visitors',
              data: counts,
              borderColor: 'rgb(74, 222, 128)',
              backgroundColor: 'rgba(74, 222, 128, 0.15)',
              fill: true,
              tension: 0.3,
              pointRadius: 4,
              pointHoverRadius: 6
            }]
          },
          options: {
            responsive: true,
            maintainAspectRatio: true,
            plugins: { legend: { display: false } },
            scales: {
              y: { beginAtZero: true, ticks: { precision: 0 } }
            }
          }
        });
      })
      .catch(function() {
        document.getElementById('stat-today').textContent = '?';
        document.getElementById('stat-week').textContent = '?';
        document.getElementById('stat-month').textContent = '?';
      });
  }

  load();

  // Fetch and display build number
  fetch('/api/build-info').then(function(r) { return r.json(); }).then(function(data) {
    var buildEl = document.getElementById('build-number');
    if (buildEl && data.buildTime) {
      var d = new Date(data.buildTime);
      d.setHours(d.getHours() + 1); // Add 1 hour for CET/CEST
      var formatted = d.toISOString().slice(0, 10).replace(/-/g, '') +
                      d.toISOString().slice(11, 16).replace(':', '');
      buildEl.textContent = 'v' + formatted;
    }
  }).catch(function() {});
})();
  </script>
</body>
</html>
