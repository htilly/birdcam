<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Visitors – Birdcam Live</title>
  <link rel="icon" type="image/png" href="favicon.png">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@400;600&family=Nunito:wght@400;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
  <style>
    /* Visitors page specific styles */
    .visitors-main {
      padding: 2rem 1.5rem;
      max-width: 1000px;
      margin: 0 auto;
    }
    .visitors-header {
      margin-bottom: 2rem;
      text-align: center;
    }
    .visitors-header-icon {
      width: 120px;
      height: auto;
      display: block;
      margin: 0 auto 1rem;
    }
    .visitors-header h1 {
      font-family: 'Fredoka', sans-serif;
      font-size: 2.5rem;
      font-weight: 600;
      color: var(--text);
      margin: 0 0 0.5rem 0;
    }
    .visitors-desc {
      font-size: 1.1rem;
      color: var(--text-muted);
      margin: 0;
    }
    .visitor-stats-cards {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
      gap: 1.5rem;
      margin-bottom: 3rem;
    }
    .visitor-card {
      background: var(--bg-elevated);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 1.5rem;
      text-align: center;
    }
    .visitor-card-value {
      display: block;
      font-family: 'Fredoka', sans-serif;
      font-size: 2.5rem;
      font-weight: 600;
      color: var(--accent);
      margin-bottom: 0.5rem;
    }
    .visitor-card-label {
      display: block;
      font-size: 0.95rem;
      color: var(--text-muted);
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }
    .visitor-chart-wrap {
      background: var(--bg-elevated);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 2rem;
    }
    .visitor-chart-wrap canvas {
      max-width: 100%;
      height: auto !important;
    }
    .visitor-chart-wrap h2 {
      font-family: 'Fredoka', sans-serif;
      font-size: 1.5rem;
      font-weight: 600;
      color: var(--text);
      margin: 0 0 1.5rem 0;
      text-align: center;
    }
    @media (max-width: 900px) {
      .visitors-main {
        padding: 1.5rem 1rem;
      }
      .visitors-header h1 {
        font-size: 2rem;
      }
      .visitor-stats-cards {
        grid-template-columns: 1fr;
        gap: 1rem;
      }
      .visitor-card-value {
        font-size: 2rem;
      }
      .visitor-chart-wrap {
        padding: 1.25rem;
      }
      .visitor-chart-wrap h2 {
        font-size: 1.25rem;
      }
    }
    @media (max-width: 600px) {
      .visitors-main {
        padding: 1rem 0.75rem;
      }
      .visitors-header-icon {
        width: 80px;
      }
      .visitors-header h1 {
        font-size: 1.5rem;
      }
      .visitors-desc {
        font-size: 0.95rem;
      }
      .visitor-card {
        padding: 1rem;
      }
      .visitor-card-value {
        font-size: 1.75rem;
      }
      .visitor-card-label {
        font-size: 0.85rem;
      }
      .visitor-chart-wrap {
        padding: 1rem;
      }
      .visitor-chart-wrap h2 {
        font-size: 1.1rem;
        margin-bottom: 1rem;
      }
    }
  </style>
</head>
<body>
  <div class="app">
    <header class="header">
      <a href="/" class="logo" style="text-decoration: none; color: inherit;">
        <img src="logo.png" alt="Birdcam Live" class="logo-img">
        Birdcam Live
      </a>
      <span class="live-pill">Live</span>
      <span class="build-number" id="build-number" style="margin-left: auto;"></span>
    </header>

    <main class="visitors-main">
      <div class="visitors-header">
        <img src="stats.png" alt="" class="visitors-header-icon">
        <h1>Visitor History</h1>
        <p class="visitors-desc">Unique visitors to the live stream page (cookie-based)</p>
      </div>

      <div class="visitor-stats-cards">
        <div class="visitor-card">
          <span class="visitor-card-value" id="stat-today">—</span>
          <span class="visitor-card-label">Unique today</span>
        </div>
        <div class="visitor-card">
          <span class="visitor-card-value" id="stat-week">—</span>
          <span class="visitor-card-label">Last 7 days</span>
        </div>
        <div class="visitor-card">
          <span class="visitor-card-value" id="stat-month">—</span>
          <span class="visitor-card-label">Last 30 days</span>
        </div>
      </div>

      <div class="visitor-chart-wrap">
        <h2>Unique visitors per day (last 30 days)</h2>
        <canvas id="visitor-chart" width="800" height="280" role="img" aria-label="Line chart of unique visitors per day"></canvas>
      </div>
    </main>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.6/dist/chart.umd.min.js"></script>
  <script src="visitors-app.js"></script>
</body>
</html>
